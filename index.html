<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tompon-daka - Lalao</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; text-align: center; background: #e3f2fd; overflow: hidden; }
        #lobby-section { padding: 20px; }
        #game-section { display: none; background: #0092FF; height: 100vh; width: 100vw; justify-content: center; align-items: center; flex-direction: column; }
        #selection-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
        #random-box { width: 150px; height: 150px; border: 5px solid white; border-radius: 15px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; overflow: hidden; background: white;}
        #random-img { width: 120px; height: 120px; object-fit: contain; }
        #selection-text { color: white; font-size: 24px; font-weight: bold; }
        svg { width: 95vw; max-height: 70vh; background: #0092FF; touch-action: none; border: 2px solid rgba(255,255,255,0.2); }
        .grid-line { stroke: #333; stroke-width: 2; }
        .label { font-size: 14px; fill: #000; font-weight: bold; }
        .player-card { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; margin: 15px auto; border: 2px solid #4caf50; border-radius: 8px; max-width: 400px; }
        #playBtn { background: #4caf50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #invitationModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid #2196f3; padding: 20px; z-index: 1000; border-radius: 10px; box-shadow: 0px 0px 20px rgba(0,0,0,0.5); }
        .btn-accept { background: #4caf50; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn-reject { background: #f44336; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        
        .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
        .spot { cursor: pointer; pointer-events: all; }
    </style>
</head>
<body>

    <div id="selection-section">
        <div id="selection-text">Mifidy loko...</div>
        <div id="random-box"><img id="random-img" src="button-red.png"></div>
    </div>

    <div id="lobby-section">
        <h1>Tompon-daka</h1>
        <div style="background: #fff; padding: 10px; border-radius: 5px; border: 1px solid #2196f3; display: inline-block;">
            <p>Anarana: <strong id="myName">...</strong></p>
            <p>UID: <span id="myUid" style="color: blue; font-family: monospace;">...</span></p>
        </div>
        <hr>
        <input type="text" id="searchUid" placeholder="Ampidiro ny UID" style="padding: 10px; width: 220px;">
        <button id="searchBtn">Recherche</button>
        <div id="resultArea" style="display: none;">
            <div class="player-card">
                <div><strong id="foundName"></strong></div>
                <button id="playBtn">ILALAO</button>
            </div>
        </div>
        <br><br>
        <button id="logoutBtn">Hivoaka</button>
    </div>

    <div id="game-section">
        <h2 id="turn-display" style="color: white; margin-bottom: 5px; text-shadow: 1px 1px 2px black;">Miandry...</h2>
        <svg id="game-board" viewBox="-50 -50 500 300">
            <defs>
                <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
                    <image href="button-red.png" x="0" y="0" width="100" height="100"/>
                </pattern>
                <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
                    <image href="button-green.png" x="0" y="0" width="100" height="100"/>
                </pattern>
            </defs>
            
            <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200 M0 0 L200 200 M100 0 L0 100 M100 0 L300 200 M200 0 L0 200 M200 0 L400 200 M300 0 L100 200 M300 0 L400 100 M400 0 L200 200 M0 100 L100 200 M400 100 L300 200"/>
            
            <g id="spots-group"></g>
            <g id="pieces-group"></g>
        </svg>
        <p style="color: white; font-size: 12px;">Tsindrio aloha ny vato, avy eo ny toerana hamindrana.</p>
    </div>

    <div id="invitationModal">
        <p><strong id="inviterName">...</strong> dia manasa anao!</p>
        <button class="btn-accept" id="acceptBtn">Hanaiky</button>
        <button class="btn-reject" id="rejectBtn">Handa</button>
    </div>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import { getDatabase, ref, get, set, child, onValue, remove, update } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyBdQzLO1C2lxlxDjheRTF0_tqE0LdGyTac",
            authDomain: "tompon-daka.firebaseapp.com",
            databaseURL: "https://tompon-daka-default-rtdb.firebaseio.com", 
            projectId: "tompon-daka",
            appId: "1:821210063213:web:79a15213fadb172555fa64"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let myUID = "", myName = "", targetUID = "", gameID = "", myColor = "";
        let selectedSpot = null;

        const allowedMoves = {
          'A1': ['A2','B1','B2'], 'A2': ['A1','A3','B2'], 'A3': ['A2','A4','B2','B3','B4'],
          'A4': ['A3','A5','B4'], 'A5': ['A4','A6','B4','B5','B6'], 'A6': ['A5','A7','B6'],
          'A7': ['A6','A8','B6','B7','B8'], 'A8': ['A7','A9','B8'], 'A9': ['A8','B8','B9'],
          'B1': ['A1','B2','C1'], 'B2': ['A1','A2','A3','B1','B3','C1','C2','C3'], 'B3': ['A3','B2','B4','C3'],
          'B4': ['A3','A4','A5','B3','B5','C3','C4','C5'], 'B5': ['A5','B4','B6','C5'], 'B6': ['A5','A6','A7','B5','B7','C5','C6','C7'],
          'B7': ['A7','B6','B8','C7'], 'B8': ['A7','A8','A9','B7','B9','C7','C8','C9'], 'B9': ['A9','B8','C9'],
          'C1': ['B1','B2','C2','D1','D2'], 'C2': ['B2','C1','C3','D2'], 'C3': ['B2','B3','B4','C2','C4','D2','D3','D4'],
          'C4': ['B4','C3','C5','D4'], 'C5': ['B4','B5','B6','C4','C6','D4','D5','D6'], 'C6': ['B6','C5','C7','D6'],
          'C7': ['B6','B7','B8','C6','C8','D6','D7','D8'], 'C8': ['B8','C7','C9','D8'], 'C9': ['B8','B9','C8','D8','D9'],
          'D1': ['C1','D2','E1'], 'D2': ['C1','C2','C3','D1','D3','E1','E2','E3'], 'D3': ['C3','D2','D4','E3'],
          'D4': ['C3','C4','C5','D3','D5','E3','E4','E5'], 'D5': ['C5','D4','D6','E5'], 'D6': ['C5','C6','C7','D5','D7','E5','E6','E7'],
          'D7': ['C7','D6','D8','E7'], 'D8': ['C7','C8','C9','D7','D9','E7','E8','E9'], 'D9': ['C9','D8','E9'],
          'E1': ['D1','D2','E2'], 'E2': ['D2','E1','E3'], 'E3': ['D2','D3','D4','E2','E4'],
          'E4': ['D4','E3','E5'], 'E5': ['D4','D5','D6','E4','E6'], 'E6': ['D6','E5','E7'],
          'E7': ['D6','D7','D8','E6','E8'], 'E8': ['D8','E7','E9'], 'E9': ['D8','D9','E8'],
        };

        const rows = ['A','B','C','D','E'];
        const cols = ['1','2','3','4','5','6','7','8','9'];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUID = user.uid; myName = user.displayName || "Mpilalao";
                document.getElementById('myName').innerText = myName;
                document.getElementById('myUid').innerText = myUID;
                console.log("Connecté en tant que:", myName, myUID);
                listenForInvitations();
            }
        });

        document.getElementById('searchBtn').onclick = async () => {
            const id = document.getElementById('searchUid').value.trim();
            const snap = await get(child(ref(db), `users/${id}`));
            if (snap.exists() && id !== myUID) {
                targetUID = id;
                document.getElementById('resultArea').style.display = "block";
                document.getElementById('foundName').innerText = snap.val().displayName;
            } else alert("Tsy hita!");
        };

        document.getElementById('playBtn').onclick = async () => {
            const seed = Math.floor(Math.random() * 2);
            const gID = myUID + "_" + targetUID;
            console.log("Envoi invitation vers:", targetUID);
            await set(ref(db, 'invitations/' + targetUID), { fromUID: myUID, fromName: myName, status: "pending", colorSeed: seed, gId: gID });
            
            onValue(ref(db, 'invitations/' + targetUID), (snap) => {
                const data = snap.val();
                if (data?.status === "accepted") {
                    myColor = (seed === 0) ? "mena" : "maintso";
                    gameID = gID;
                    initGameDB();
                    startSelectionProcess();
                }
            });
        };

        function listenForInvitations() {
            onValue(ref(db, 'invitations/' + myUID), (snap) => {
                const data = snap.val();
                if (data?.status === "pending") {
                    document.getElementById('invitationModal').style.display = "block";
                    document.getElementById('inviterName').innerText = data.fromName;
                    document.getElementById('acceptBtn').onclick = async () => {
                        myColor = (data.colorSeed === 0) ? "maintso" : "mena";
                        gameID = data.gId;
                        console.log("Invitation acceptée. Loko:", myColor);
                        await update(ref(db, 'invitations/' + myUID), { status: "accepted" });
                        startSelectionProcess();
                    };
                }
            });
        }

        async function initGameDB() {
            console.log("Initialisation du plateau...");
            const pieces = {};
            rows.forEach((r, ri) => {
                cols.forEach((c, ci) => {
                    let key = r + c;
                    if (ri < 2) pieces[key] = "mena";
                    else if (ri > 2) pieces[key] = "maintso";
                    else {
                        if ([0,1,3,8].includes(ci)) pieces[key] = "mena";
                        if ([2,4,6,7].includes(ci)) pieces[key] = "maintso";
                    }
                });
            });
            await set(ref(db, 'games/' + gameID), { pieces: pieces, turn: "maintso" });
        }

        function startSelectionProcess() {
            document.getElementById('lobby-section').style.display = "none";
            document.getElementById('invitationModal').style.display = "none";
            const section = document.getElementById('selection-section');
            section.style.display = "flex";
            const img = document.getElementById('random-img');
            let images = ["button-red.png", "button-green.png"], i = 0;
            let timer = setInterval(() => { img.src = images[i % 2]; i++; }, 100);
            
            setTimeout(() => {
                clearInterval(timer);
                img.src = (myColor === "mena") ? "button-red.png" : "button-green.png";
                document.getElementById('selection-text').innerText = "Lokonao: " + myColor.toUpperCase();
                setTimeout(() => {
                    section.style.display = "none";
                    document.getElementById('game-section').style.display = "flex";
                    drawBoardSpots();
                    watchGame();
                }, 1500);
            }, 3000);
        }

        function drawBoardSpots() {
            const grp = document.getElementById('spots-group');
            grp.innerHTML = "";
            rows.forEach((r, ri) => {
                cols.forEach((c, ci) => {
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", ci * 50);
                    circle.setAttribute("cy", ri * 50);
                    circle.setAttribute("r", 18);
                    circle.setAttribute("fill", "transparent");
                    circle.setAttribute("class", "spot");
                    circle.onclick = () => handleSpotClick(r + c);
                    grp.appendChild(circle);
                });
            });
        }

        function watchGame() {
            console.log("Lecture du jeu en temps réel...");
            onValue(ref(db, 'games/' + gameID), (snap) => {
                const data = snap.val();
                if (!data) return;
                renderPieces(data.pieces);
                const display = document.getElementById('turn-display');
                display.innerText = (data.turn === myColor) ? "ANJARANAO IZAO" : "Anjaran'ny hafa...";
                display.style.color = (data.turn === myColor) ? "#ADFF2F" : "white";
            });
        }

        function renderPieces(pieces) {
            const grp = document.getElementById('pieces-group');
            grp.innerHTML = "";
            console.log("Affichage des pièces...");
            for (let spot in pieces) {
                const ri = rows.indexOf(spot[0]);
                const ci = cols.indexOf(spot[1]);
                const color = pieces[spot];
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("cx", ci * 50);
                circle.setAttribute("cy", ri * 50);
                circle.setAttribute("r", 15);
                
                // Mampiasa an'ilay pattern ID "mena-pat" na "maintso-pat"
                const patID = (color === "mena") ? "mena-pat" : "maintso-pat";
                circle.setAttribute("fill", `url(#${patID})`);
                
                if (selectedSpot === spot) {
                    circle.setAttribute("class", "selected-piece");
                }
                
                circle.style.pointerEvents = "none";
                grp.appendChild(circle);
            }
        }

        async function handleSpotClick(spotID) {
            console.log("Click sur spot:", spotID);
            const snap = await get(ref(db, 'games/' + gameID));
            const data = snap.val();
            if (data.turn !== myColor) {
                console.log("Pas votre tour!");
                return;
            }

            const pieces = data.pieces;

            // Raha manindry ny vatony izy mba hisafidy
            if (pieces[spotID] === myColor) {
                selectedSpot = spotID;
                console.log("Vato voafidy:", selectedSpot);
                renderPieces(pieces);
                return;
            }

            // Raha efa nifidy vato ka hifindra
            if (selectedSpot) {
                const moveList = allowedMoves[selectedSpot];
                if (moveList && moveList.includes(spotID) && !pieces[spotID]) {
                    console.log("Mifindra:", selectedSpot, "->", spotID);
                    const newPieces = { ...pieces };
                    delete newPieces[selectedSpot];
                    newPieces[spotID] = myColor;
                    
                    const nextTurn = (myColor === "mena") ? "maintso" : "mena";
                    selectedSpot = null;
                    await update(ref(db, 'games/' + gameID), { pieces: newPieces, turn: nextTurn });
                } else {
                    console.log("Hetsika tsy azo atao!");
                    selectedSpot = null;
                    renderPieces(pieces);
                }
            }
        }

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
  </html>
