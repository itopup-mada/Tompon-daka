<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Tompon-daka</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input { margin-bottom: 10px; padding: 8px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; background: #2196f3; color: white; border: none; border-radius: 4px; }
        button:hover { background: #1976d2; }
    </style>
</head>
<body>
    <h2>Fisoratana anarana (New Version)</h2>
    <form id="registerForm">
        <input type="text" id="regNom" placeholder="Anarana" required><br>
        <input type="email" id="regEmail" placeholder="Email" required><br>
        <input type="password" id="regPassword" placeholder="Teny miafina" required><br>
        <input type="password" id="regRepeatPassword" placeholder="Hamafiso" required><br>
        <button type="submit">Hisoratra anarana</button>
    </form>

    <hr>
    <h2>Fidirana</h2>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required><br>
        <input type="password" id="loginPassword" placeholder="Teny miafina" required><br>
        <button type="submit">Hiditra</button>
    </form>

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "firebase/auth";
        import { getDatabase, ref, set } from "firebase/database";

        const firebaseConfig = {
            apiKey: "AIzaSyBdQzLO1C2lxlxDjheRTF0_tqE0LdGyTac",
            authDomain: "tompon-daka.firebaseapp.com",
            // Tsy maintsy mifanaraka amin'ilay ao amin'ny Console-nao ity URL ity
            databaseURL: "https://tompon-daka-default-rtdb.firebaseio.com", 
            projectId: "tompon-daka",
            appId: "1:821210063213:web:79a15213fadb172555fa64"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- INSCRIPTION (Fisoratana) ---
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('regNom').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const repeat = document.getElementById('regRepeatPassword').value;

            if (password !== repeat) return alert("Tsy mitovy ny teny miafina!");

            try {
                console.log("1. Manomboka mamorona kaonty Auth...");
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                console.log("2. Manavao ny Display Name...");
                await updateProfile(user, { displayName: nom });

                console.log("3. Mampiditra data ao amin'ny Realtime Database...");
                // Ity no mampiditra ny UID sy Anarana ao amin'ilay Database nisy 'null'
                await set(ref(db, 'users/' + user.uid), {
                    displayName: nom,
                    uid: user.uid,
                    email: email,
                    date: Date.now()
                });

                console.log("Vita! Tafiditra ao amin'ny Database ny UID: " + user.uid);
                alert("Tafita ny fisoratana! Ny UID-nao dia hita ao amin'ny pejy manaraka.");
                window.location.href = "tompon-daka-2_home.html";

            } catch (error) {
                console.error("Hadisoana teo am-pisoratana:", error.code);
                alert("Fahadisoana: " + error.message);
            }
        });

        // --- LOGIN (Fidirana) ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                console.log("Andrana fidirana...");
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "tompon-daka-2_home.html";
            } catch (error) {
                console.error("Hadisoana teo am-pidirana:", error.code);
                alert("Tsy mety ny Email na Teny miafina!");
            }
        });
    </script>
</body>
    </html>
