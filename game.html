<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tompon-daka - Lalao</title>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; text-align: center; background: #0092FF; overflow: hidden; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .flipped { transform: rotate(180deg); }
    .grid-line { stroke: #333; stroke-width: 2; }
    
    /* Animation an'ny pio - 0.5s hisosa tsara */
    .piece-group { transition: transform 0.2s ease-in-out; }
    
    .selected-piece { stroke: #FFF700; stroke-width: 5px; paint-order: stroke; filter: drop-shadow(0 0 8px yellow); }
    .movable-piece { stroke: #ADFF2F; stroke-width: 5px; paint-order: stroke; }
    .blocked-piece { stroke: #FF4500; stroke-width: 5px; paint-order: stroke; }
    
    .capture-target { stroke: darkorange; stroke-width: 5px; cursor: pointer; pointer-events: all !important; stroke-dasharray: 5; animation: dash 1s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: 10; } }
    
    .spot { cursor: pointer; pointer-events: all; }
    .lock-board .spot { pointer-events: none !important; }
    .cross-line { stroke: white; stroke-width: 3; stroke-linecap: round; pointer-events: none; }
    .guide-dot { fill: #FFF700; opacity: 0.8; pointer-events: none; }
    
    #stop-move-btn { width: 60px; height: 60px; border-radius: 50%; background: #f44336; color: white; border: 4px solid white; font-size: 30px; font-weight: bold; cursor: pointer; margin-top: 20px; opacity: 0.3; transition: 0.3s; pointer-events: none; }
    #stop-move-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.5); pointer-events: all; }
    #info-box { color: white; margin-bottom: 10px; font-weight: bold; }
  </style>
</head>
<body>

  <div id="info-box">
    <h2 id="turn-display">Miandry...</h2>
  </div>

  <svg id="game-board" viewBox="-50 -50 500 300">
    <defs>
      <pattern id="mena-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-red.png" x="0" y="0" width="100" height="100"/>
      </pattern>
      <pattern id="maintso-pat" x="0" y="0" width="1" height="1" viewBox="0 0 100 100">
        <image href="button-green.png" x="0" y="0" width="100" height="100"/>
      </pattern>
    </defs>
    <path class="grid-line" d="M0 0 H400 M0 50 H400 M0 100 H400 M0 150 H400 M0 200 H400 M0 0 V200 M50 0 V200 M100 0 V200 M150 0 V200 M200 0 V200 M250 0 V200 M300 0 V200 M350 0 V200 M400 0 V200 M0 0 L200 200 M100 0 L0 100 M100 0 L300 200 M200 0 L0 200 M200 0 L400 200 M300 0 L100 200 M300 0 L400 100 M400 0 L200 200 M0 100 L100 200 M400 100 L300 200"/>
    <g id="spots-group"></g>
    <g id="guides-group"></g>
    <g id="pieces-group"></g>
  </svg>

  <button id="stop-move-btn">OK</button>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged } from "firebase/auth";
    import { getDatabase, ref, get, set, onValue, update } from "firebase/database";

    const firebaseConfig = {
      apiKey: "AIzaSyBdQzLO1C2lxlxDjheRTF0_tqE0LdGyTac",
      authDomain: "tompon-daka.firebaseapp.com",
      databaseURL: "https://tompon-daka-default-rtdb.firebaseio.com", 
      projectId: "tompon-daka",
      appId: "1:821210063213:web:79a15213fadb172555fa64"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const gameID = urlParams.get('gameID');
    const myColor = urlParams.get('color');

    const rows = ['A','B','C','D','E'], cols = ['1','2','3','4','5','6','7','8','9'];
    let selectedSpot = null, lastBlockedSpot = null, canChangePiece = true;
    let pendingCaptures = { approach: [], withdrawal: [], moveData: null, newVisited: [] };
    let pieceRegistry = {}; // Mitazona ny DOM element an'ny pio tsirairay

    const allowedMoves = {
      'A1': ['A2','B1','B2'], 'A2': ['A1','A3','B2'], 'A3': ['A2','A4','B2','B3','B4'],
      'A4': ['A3','A5','B4'], 'A5': ['A4','A6','B4','B5','B6'], 'A6': ['A5','A7','B6'],
      'A7': ['A6','A8','B6','B7','B8'], 'A8': ['A7','A9','B8'], 'A9': ['A8','B8','B9'],
      'B1': ['A1','B2','C1'], 'B2': ['A1','A2','A3','B1','B3','C1','C2','C3'], 'B3': ['A3','B2','B4','C3'],
      'B4': ['A3','A4','A5','B3','B5','C3','C4','C5'], 'B5': ['A5','B4','B6','C5'], 'B6': ['A5','A6','A7','B5','B7','C5','C6','C7'],
      'B7': ['A7','B6','B8','C7'], 'B8': ['A7','A8','A9','B7','B9','C7','C8','C9'], 'B9': ['A9','B8','C9'],
      'C1': ['B1','B2','C2','D1','D2'], 'C2': ['B2','C1','C3','D2'], 'C3': ['B2','B3','B4','C2','C4','D2','D3','D4'],
      'C4': ['B4','C3','C5','D4'], 'C5': ['B4','B5','B6','C4','C6','D4','D5','D6'], 'C6': ['B6','C5','C7','D6'],
      'C7': ['B6','B7','B8','C6','C8','D6','D7','D8'], 'C8': ['B8','C7','C9','D8'], 'C9': ['B8','B9','C8','D8','D9'],
      'D1': ['C1','D2','E1'], 'D2': ['C1','C2','C3','D1','D3','E1','E2','E3'], 'D3': ['C3','D2','D4','E3'],
      'D4': ['C3','C4','C5','D3','D5','E3','E4','E5'], 'D5': ['C5','D4','D6','E5'], 'D6': ['C5','C6','C7','D5','D7','E5','E6','E7'],
      'D7': ['C7','D6','D8','E7'], 'D8': ['C7','C8','C9','D7','D9','E7','E8','E9'], 'D9': ['C9','D8','E9'],
      'E1': ['D1','D2','E2'], 'E2': ['D2','E1','E3'], 'E3': ['D2','D3','D4','E2','E4'],
      'E4': ['D4','E3','E5'], 'E5': ['D4','D5','D6','E4','E6'], 'E6': ['D6','E5','E7'],
      'E7': ['D6','D7','D8','E6','E8'], 'E8': ['D8','E7','E9'], 'E9': ['D8','D9','E8'],
    };

    onAuthStateChanged(auth, (user) => {
      if (user && gameID) initGame();
      else if (!gameID) window.location.href = "index.html";
    });

    async function initGame() {
      const board = document.getElementById('game-board');
      if (myColor === "mena") board.classList.add('flipped');
      drawBoardSpots();
      const gameRef = ref(db, 'games/' + gameID);
      const snap = await get(gameRef);
      if (!snap.exists()) {
        const pieces = {};
        rows.forEach((r, ri) => {
          cols.forEach((c, ci) => {
            let key = r + c;
            if (ri < 2) pieces[key] = "mena";
            else if (ri > 2) pieces[key] = "maintso";
            else {
              if ([1, 3, 6, 8].includes(ci)) pieces[key] = "mena";
              else if ([0, 2, 5, 7].includes(ci)) pieces[key] = "maintso";
            }
          });
        });
        await set(gameRef, { pieces, turn: "maintso", movingPiece: "", visited: [], lastDir: "" });
      }
      watchGame();
    }

    function drawBoardSpots() {
      const grp = document.getElementById('spots-group');
      grp.innerHTML = "";
      rows.forEach((r, ri) => {
        cols.forEach((c, ci) => {
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", ci * 50); circle.setAttribute("cy", ri * 50);
          circle.setAttribute("r", 22); circle.setAttribute("fill", "transparent");
          circle.setAttribute("class", "spot");
          circle.onclick = () => handleSpotClick(r + c);
          grp.appendChild(circle);
        });
      });
    }

    function watchGame() {
      onValue(ref(db, 'games/' + gameID), (snap) => {
        const data = snap.val();
        if (!data) return;
        const display = document.getElementById('turn-display');
        const stopBtn = document.getElementById('stop-move-btn');
        if (data.turn === myColor) {
          display.innerText = "ANJARANAO"; display.style.color = "#ADFF2F";
          if (data.movingPiece) { 
            selectedSpot = data.movingPiece; 
            canChangePiece = false; 
            stopBtn.classList.add('active'); 
          } else { 
            canChangePiece = true; 
            stopBtn.classList.remove('active'); 
          }
          if (selectedSpot && pendingCaptures.approach.length === 0) renderGuides(selectedSpot, data);
        } else {
          display.innerText = "Miandry ny hafa..."; display.style.color = "white";
          selectedSpot = null; lastBlockedSpot = null; stopBtn.classList.remove('active');
          document.getElementById('guides-group').innerHTML = "";
        }
        renderPieces(data.pieces, data);
      });
    }

    function playerHasAnyCapture(pieces, color) {
        for (let spot in pieces) {
            if (pieces[spot] === color) {
                const moves = allowedMoves[spot] || [];
                for (let target of moves) {
                    if (!pieces[target]) {
                        const caps = getCaptures(pieces, spot, target, color);
                        if (caps.approach.length > 0 || caps.withdrawal.length > 0) return true;
                    }
                }
            }
        }
        return false;
    }

    // VAOVAO: Fomba fanaovana sary tsy mamafa ny pieces rehetra mba hisy animation
    function renderPieces(pieces, gameData) {
      const grp = document.getElementById('pieces-group');
      const isCapturing = pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0;
      document.getElementById('game-board').classList.toggle('lock-board', isCapturing);

      const isMyTurn = gameData.turn === myColor;
      const globalCapture = playerHasAnyCapture(pieces, myColor);
      const isPieceLocked = gameData.movingPiece !== "";

      // 1. Fafana ny pio maty
      for (let spotId in pieceRegistry) {
        if (!pieces[spotId]) {
          pieceRegistry[spotId].remove();
          delete pieceRegistry[spotId];
        }
      }

      // 2. Amboarina na amindra ny pio velona
      for (let spot in pieces) {
        const ri = rows.indexOf(spot[0]), ci = cols.indexOf(spot[1]);
        let g = pieceRegistry[spot];

        if (!g) {
          g = document.createElementNS("http://www.w3.org/2000/svg", "g");
          g.setAttribute("class", "piece-group");
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("r", 8);
          g.appendChild(circle);
          grp.appendChild(g);
          pieceRegistry[spot] = g;
        }

        // Fisorana: Ampiasaina ny transform fa tsy cx/cy
        g.setAttribute("transform", `translate(${ci * 50}, ${ri * 50})`);
        
        const circle = g.querySelector('circle');
        const colorPat = pieces[spot] === "mena" ? "mena-pat" : "maintso-pat";
        circle.setAttribute("fill", `url(#${colorPat})`);
        circle.removeAttribute("class");
        circle.style.pointerEvents = "none";

        // Stroke lojika
        if (isMyTurn && pieces[spot] === myColor && !isCapturing) {
          if (selectedSpot === spot) {
            circle.setAttribute("class", "selected-piece");
          } else if (lastBlockedSpot === spot) {
            circle.setAttribute("class", "blocked-piece");
          } else if (!isPieceLocked) {
             if (canPieceMove(spot, pieces, myColor, globalCapture)) {
               circle.setAttribute("class", "movable-piece");
             }
          }
        }

        // Capture logic (Cross lines)
        const isApp = pendingCaptures.approach.includes(spot);
        const isWith = pendingCaptures.withdrawal.includes(spot);
        g.querySelectorAll('.cross-line').forEach(l => l.remove());

        if (isApp || isWith) {
          circle.classList.add("capture-target");
          circle.style.pointerEvents = "all";
          circle.onclick = (e) => { e.stopPropagation(); confirmCapture(isApp ? 'approach' : 'withdrawal'); };
          
          const createLine = (x1, y1, x2, y2) => {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", x1); l.setAttribute("y1", y1); l.setAttribute("x2", x2); l.setAttribute("y2", y2);
            l.setAttribute("class", "cross-line");
            return l;
          };
          g.appendChild(createLine(-8, -8, 8, 8));
          g.appendChild(createLine(8, -8, -8, 8));
        }
      }
    }

    function canPieceMove(spot, pieces, color, globalCapture) {
      const moves = allowedMoves[spot] || [];
      return moves.some(target => {
        if (pieces[target]) return false;
        const caps = getCaptures(pieces, spot, target, color);
        const isCap = (caps.approach.length > 0 || caps.withdrawal.length > 0);
        if (globalCapture) return isCap;
        return true;
      });
    }

    function renderGuides(startSpot, gameData) {
      const grp = document.getElementById('guides-group');
      grp.innerHTML = "";
      const { pieces, visited, lastDir } = gameData;
      const globalCapturePossible = playerHasAnyCapture(pieces, myColor);
      const moves = allowedMoves[startSpot] || [];

      moves.forEach(target => {
        if (pieces[target] || (visited && visited.includes(target))) return;
        const caps = getCaptures(pieces, startSpot, target, myColor);
        const isCaptureMove = (caps.approach.length > 0 || caps.withdrawal.length > 0);
        if (globalCapturePossible && !isCaptureMove) return;
        const r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
        const r2 = rows.indexOf(target[0]), c2 = cols.indexOf(target[1]);
        if (!canChangePiece && lastDir === `${r2-r1},${c2-c1}`) return;
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", cols.indexOf(target[1]) * 50); dot.setAttribute("cy", rows.indexOf(target[0]) * 50);
        dot.setAttribute("r", 6); dot.setAttribute("class", "guide-dot");
        grp.appendChild(dot);
      });
    }

    async function handleSpotClick(spotID) {
      const snap = await get(ref(db, 'games/' + gameID));
      const data = snap.val();
      if (data.turn !== myColor || (pendingCaptures.approach.length > 0 || pendingCaptures.withdrawal.length > 0)) return;

      const globalCapturePossible = playerHasAnyCapture(data.pieces, myColor);

      if (canChangePiece && data.pieces[spotID] === myColor) { 
        const movable = canPieceMove(spotID, data.pieces, myColor, globalCapturePossible);
        if (movable) {
          selectedSpot = spotID;
          lastBlockedSpot = null;
        } else {
          selectedSpot = null;
          lastBlockedSpot = spotID;
        }
        renderGuides(selectedSpot || "", data);
        renderPieces(data.pieces, data);
        return; 
      }

      if (selectedSpot && (allowedMoves[selectedSpot]||[]).includes(spotID) && !data.pieces[spotID]) {
        if (data.visited && data.visited.includes(spotID)) return;
        const caps = getCaptures(data.pieces, selectedSpot, spotID, myColor);
        const isCaptureMove = (caps.approach.length > 0 || caps.withdrawal.length > 0);
        if (globalCapturePossible && !isCaptureMove) return;

        const r1 = rows.indexOf(selectedSpot[0]), c1 = cols.indexOf(selectedSpot[1]), r2 = rows.indexOf(spotID[0]), c2 = cols.indexOf(spotID[1]);
        const dir = `${r2-r1},${c2-c1}`;
        if (!canChangePiece && data.lastDir === dir) return;

        // Mifindra ny pio ato anaty Registry koa mba tsy ho foana ny DOM element
        const moveData = { origin: selectedSpot, target: spotID, pieces: {...data.pieces}, dir };
        
        const pieceElem = pieceRegistry[selectedSpot];
        delete pieceRegistry[selectedSpot];
        pieceRegistry[spotID] = pieceElem;

        delete moveData.pieces[selectedSpot]; 
        moveData.pieces[spotID] = myColor;
        const newV = [...(data.visited || []), selectedSpot];

        if (isCaptureMove) {
          if (caps.approach.length > 0 && caps.withdrawal.length > 0) {
            pendingCaptures = { approach: caps.approach, withdrawal: caps.withdrawal, moveData, newVisited: newV };
            renderPieces(moveData.pieces, data);
          } else {
            [...caps.approach, ...caps.withdrawal].forEach(t => delete moveData.pieces[t]);
            finalizeMove(moveData.pieces, spotID, newV, dir, true);
          }
        } else {
          finalizeMove(moveData.pieces, spotID, newV, dir, false);
        }
      }
    }

    function getCaptures(pieces, s, e, color) {
      const r1 = rows.indexOf(s[0]), c1 = cols.indexOf(s[1]), r2 = rows.indexOf(e[0]), c2 = cols.indexOf(e[1]), enemy = color === "mena" ? "maintso" : "mena", dr = r2-r1, dc = c2-c1;
      const scan = (row, col, sr, sc) => {
        let res = [], cr = row+sr, cc = col+sc;
        while(cr>=0 && cr<5 && cc>=0 && cc<9 && pieces[rows[cr]+cols[cc]] === enemy) { res.push(rows[cr]+cols[cc]); cr+=sr; cc+=sc; }
        return res;
      };
      return { approach: scan(r2, c2, dr, dc), withdrawal: scan(r1, c1, -dr, -dc) };
    }

    async function confirmCapture(type) {
      const { moveData, approach, withdrawal, newVisited } = pendingCaptures;
      const final = {...moveData.pieces};
      (type==='approach' ? approach : withdrawal).forEach(t => delete final[t]);
      pendingCaptures = { approach: [], withdrawal: [], moveData: null, newVisited: [] };
      finalizeMove(final, moveData.target, newVisited, moveData.dir, true);
    }

    async function finalizeMove(p, cur, v, d, wasCapture) {
      if (wasCapture) {
        const hasMore = checkAvailableCaptures(p, cur, v, d);
        if (hasMore) {
          selectedSpot = cur; 
          canChangePiece = false;
          await update(ref(db, 'games/' + gameID), { pieces: p, movingPiece: cur, visited: v, lastDir: d });
          return;
        }
      }
      await stopMoveManually(p);
    }

    function checkAvailableCaptures(pieces, startSpot, visited, lastDir) {
      const moves = allowedMoves[startSpot] || [];
      return moves.some(target => {
        if (pieces[target] || (visited && visited.includes(target))) return false;
        const r1 = rows.indexOf(startSpot[0]), c1 = cols.indexOf(startSpot[1]);
        const r2 = rows.indexOf(target[0]), c2 = cols.indexOf(target[1]);
        if (lastDir === `${r2-r1},${c2-c1}`) return false;
        const caps = getCaptures(pieces, startSpot, target, myColor);
        return (caps.approach.length > 0 || caps.withdrawal.length > 0);
      });
    }

    async function stopMoveManually(currentPieces) {
      selectedSpot = null; lastBlockedSpot = null;
      await update(ref(db, 'games/' + gameID), { 
        pieces: currentPieces,
        turn: myColor === "mena" ? "maintso" : "mena", 
        movingPiece: "", 
        visited: [], 
        lastDir: "" 
      });
    }

    document.getElementById('stop-move-btn').onclick = async () => {
      const snap = await get(ref(db, 'games/' + gameID));
      const data = snap.val();
      if (data.turn !== myColor || !data.movingPiece) return;
      await stopMoveManually(data.pieces);
    };
  </script>
</body>
</html>
